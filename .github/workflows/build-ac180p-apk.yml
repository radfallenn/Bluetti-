name: Build AC180P APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/AC180PControlApp/**'
      - '.github/workflows/build-ac180p-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/AC180PControlApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AC180PControl-debug-apk
          path: app/AC180PControlApp/app/build/outputs/apk/debug/*.apk
