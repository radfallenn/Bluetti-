name: Validate Bluetti BT
on: [push, pull_request, workflow_dispatch]
jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile integration
        run: python -m py_compile custom_components/bluetti_bt/*.py custom_components/bluetti_bt/types/*.py
