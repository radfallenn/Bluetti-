services:
  bluetti-bridge:
    build: .
    container_name: bluetti-bridge
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - /var/run/dbus:/var/run/dbus
      - /run/dbus:/run/dbus
